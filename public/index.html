<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>酒店查价控制台</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div>
        <h1>酒店查价控制台</h1>
        <p>携程、洲际、万豪查价调试，以及 CloakBrowser 手动查询。</p>
      </div>
      <button id="healthButton" class="icon-button" title="刷新服务状态" aria-label="刷新服务状态">
        <span class="icon">↻</span>
      </button>
    </header>

    <section class="status-strip">
      <div>
        <span class="label">服务</span>
        <strong id="healthStatus">检查中</strong>
      </div>
      <div>
        <span class="label">端口</span>
        <strong>3100</strong>
      </div>
      <div>
        <span class="label">查价浏览器</span>
        <strong id="browserPoolCount">0 个</strong>
      </div>
      <div class="status-action">
        <button id="closeAllBrowsersButton" class="danger-button-sm" disabled>
          关闭全部浏览器
        </button>
      </div>
    </section>

    <section class="grid">
      <article class="panel">
        <div class="panel-head">
          <div>
            <h2>查价</h2>
            <p>提交后会按 provider 调用自动查价模块。</p>
          </div>
        </div>

        <form id="priceForm" class="form-grid">
          <label>
            <span>酒店名称</span>
            <input name="hotelName" value="上海鲁能JW万豪侯爵酒店" required>
          </label>
          <label>
            <span>入住日期</span>
            <input name="checkIn" type="date" value="2026-07-01" required>
          </label>
          <label>
            <span>离店日期</span>
            <input name="checkOut" type="date" value="2026-07-02" required>
          </label>
          <label>
            <span>房间数</span>
            <input name="rooms" type="number" min="1" value="1">
          </label>
          <label>
            <span>成人数</span>
            <input name="adults" type="number" min="1" value="2">
          </label>
          <label>
            <span>儿童数</span>
            <input name="children" type="number" min="0" value="0">
          </label>

          <fieldset class="provider-fieldset">
            <legend>查询平台</legend>
            <label class="checkbox-row">
              <input type="checkbox" name="providers" value="ctrip" checked>
              <span>携程</span>
            </label>
            <label class="checkbox-row">
              <input type="checkbox" name="providers" value="ihg" checked>
              <span>洲际 (IHG)</span>
            </label>
            <label class="checkbox-row">
              <input type="checkbox" name="providers" value="marriott" checked>
              <span>万豪 (Marriott)</span>
            </label>
          </fieldset>

          <label class="toggle-row keep-browser-row">
            <input id="keepBrowserOpen" type="checkbox" checked>
            <span>查价后保持浏览器打开</span>
          </label>

          <div class="form-actions">
            <button type="submit" class="primary-button">
              <span class="icon">⌕</span>
              开始查价
            </button>
          </div>
        </form>
      </article>

      <article class="panel">
        <div class="panel-head">
          <div>
            <h2>手动浏览器</h2>
            <p>选择站点后打开真实 CloakBrowser 窗口，手动查价或调试页面。</p>
          </div>
        </div>

        <div class="browser-actions">
          <label>
            <span>打开站点</span>
            <select id="manualProvider">
              <option value="ctrip">携程</option>
              <option value="ihg">洲际</option>
              <option value="marriott" selected>万豪</option>
            </select>
          </label>
          <label class="toggle-row">
            <input id="openSearchUrl" type="checkbox" checked>
            <span>直接打开带酒店和日期的站点入口</span>
          </label>
          <button id="openBrowserButton" class="primary-button">
            <span class="icon">▣</span>
            打开浏览器
          </button>
          <button id="closeBrowserButton" class="danger-button" disabled>
            <span class="icon">×</span>
            关闭浏览器
          </button>
        </div>

        <div class="session-box">
          <div>
            <span class="label">Session</span>
            <strong id="sessionId">-</strong>
          </div>
          <div>
            <span class="label">状态</span>
            <strong id="sessionStatus">未启动</strong>
          </div>
          <div>
            <span class="label">指纹</span>
            <strong id="fingerprintSeed">-</strong>
          </div>
        </div>

        <pre id="browserLog" class="log-box">等待操作</pre>
      </article>
    </section>

    <section class="grid grid-proxy">
      <article class="panel">
        <div class="panel-head">
          <div>
            <h2>代理 IP 配置</h2>
            <p>配置浏览器使用的代理服务器，支持 SOCKS5 和 HTTP 代理。</p>
          </div>
        </div>

        <div class="proxy-form">
          <label class="toggle-row">
            <input id="proxyEnabled" type="checkbox">
            <span>启用代理</span>
          </label>
          <label>
            <span>提取链接</span>
            <div class="input-with-button">
              <input id="proxyExtractUrl" type="text" placeholder="https://service.ipzan.com/core-extract?num=1&no=...">
              <button id="proxyExtractButton" class="icon-button-wide" type="button">
                <span class="icon">↓</span>
                提取
              </button>
            </div>
          </label>
          <label>
            <span>当前代理地址</span>
            <input id="proxyUrl" type="text" placeholder="socks5://user:pass@host:port">
          </label>
          <div class="proxy-info" id="proxyInfo"></div>
          <div class="proxy-actions">
            <button id="proxySaveButton" class="primary-button">
              <span class="icon">✓</span>
              保存
            </button>
            <button id="proxyTestButton" class="icon-button-wide">
              <span class="icon">⚡</span>
              测试连接
            </button>
          </div>
          <div id="proxyTestResult" class="proxy-result"></div>
        </div>
      </article>
    </section>

    <section class="panel">
      <div class="panel-head">
        <div>
          <h2>结果</h2>
          <p>自动查价结果和接口错误会显示在这里。</p>
        </div>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Provider</th>
              <th>匹配酒店</th>
              <th>状态</th>
              <th>价格</th>
              <th>币种</th>
              <th>错误</th>
            </tr>
          </thead>
          <tbody id="resultRows">
            <tr>
              <td colspan="6" class="empty">暂无结果</td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="/app.js" type="module"></script>
</body>
</html>
